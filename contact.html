<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Enzo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen flex flex-col justify-between">
    
    <nav class="bg-slate-950/40 backdrop-blur-md sticky top-0 border-b border-slate-800 z-50">
      <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="text-xl font-mono font-bold text-cyan-400">Enzo</a>
        <div class="flex space-x-6 text-sm font-medium text-slate-400">
          <a href="index.html" class="hover:text-cyan-400">Overview</a>
          <a href="architecture.html" class="hover:text-cyan-400">Architecture</a>
          <a href="stack.html" class="hover:text-cyan-400">Stack</a>
          <a href="contact.html" class="text-cyan-400 font-semibold">Contact</a>
        </div>
      </div>
    </nav>

    <main class=" py-20 flex items-center">
      <div class="max-w-xl mx-auto px-4 w-full">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-white font-mono">Initialize Connection</h2>
          <p class="text-slate-400 mt-1">Drop a message or request my public GitHub project configurations.</p>
        </div>

        <form class="bg-slate-900/40 p-8 rounded-2xl border border-slate-800/80 space-y-5 shadow-xl shadow-cyan-900" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
          <div class="text-center pb-2 border-b border-slate-800/60">
            <h3 class="text-xl font-bold text-white">Get in Touch</h3>
            <p class="text-sm text-slate-400 mt-1">Have a question or want to collaborate on a project?</p>
          </div>

          <div>
            <label class="block text-xs font-mono font-bold text-slate-400 uppercase tracking-wide mb-1.5">Your Name</label>
            <input type="text" placeholder="Enzo" class="w-full bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all" required />
          </div>

          <div>
            <label class="block text-xs font-mono font-bold text-slate-400 uppercase tracking-wide mb-1.5">Email Address</label>
            <input type="email" placeholder="you@example.com" class="w-full bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all" required />
          </div>

          <div>
            <label class="block text-xs font-mono font-bold text-slate-400 uppercase tracking-wide mb-1.5">Inquiry Type</label>
            <div class="relative">
              <select class="w-full bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 text-sm text-slate-300 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all appearance-none">
                <option>General Collaboration</option>
                <option>Flutter Mobile App Development</option>
                <option>Backend &amp; API Engineering</option>
                <option>Database Management</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                  <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                </svg>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-mono font-bold text-slate-400 uppercase tracking-wide mb-1.5">Your Message</label>
            <textarea rows="4" placeholder="Tell me about your project ideas..." class="w-full bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all resize-none" required></textarea>
          </div>

          <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold py-3 rounded-xl transition-all text-sm shadow-lg shadow-cyan-900 active:bg-cyan-700">
            Send Message
          </button>
        </form>
      </div>
    </main>

    <footer class="bg-slate-950 text-slate-600 py-8 text-center text-xs font-mono border-t border-slate-900/60">
      <p>&copy; 2026 Mobile Backend System Architecture. Built with Tailwind CSS.</p>
    </footer>
  </body>
</html>
